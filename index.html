<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <img src="img/nav_diamond.png" alt="coin">
                <span id="balance">10000</span>
            </div>
        </header>

        <main id="content">
            <section id="page-cases" class="page active">
                <h2 class="title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </section>
            <section id="page-bonus" class="page">
                <h2 class="title">BONUS</h2>
                <div id="bonus-list" class="list"></div>
            </section>
            <section id="page-inventory" class="page">
                <h2 class="title">INVENTORY</h2>
                <div id="inv-grid" class="grid"></div>
            </section>
            <section id="page-profile" class="page">
                <h2 class="title">PROFILE</h2>
                <div class="profile-card">
                    <input type="text" id="tradeLinkInput" placeholder="Steam Trade Link...">
                    <button onclick="saveSteamLink()">SAQLASH</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)"><img src="img/nav_diamond.png"></button>
            <button class="nav-btn active" onclick="showPage('cases', this)"><img src="img/nav_case.png"></button>
            <button class="nav-btn" onclick="showPage('inventory', this)"><img src="img/nav_inventory.png"></button>
            <button class="nav-btn" onclick="showPage('profile', this)"><img src="img/profile.png"></button>
        </nav>
    </div>

    <div id="roulette-modal">
        <div id="roulette-viewport" class="roulette-viewport"><div id="roulette-track" class="roulette-track"></div></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
