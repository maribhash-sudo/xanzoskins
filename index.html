<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="stats-bar">
            <div class="balance">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="top-up">To'ldirish</button>
        </div>

        <div id="section-cases" class="app-section active">
            <h2 class="title">CASES</h2>
            <div id="cases-grid" class="cases-grid"></div>
        </div>

        <div id="section-bonus" class="app-section">
            <h2 class="title">BONUS</h2>
            <div class="card">Kunlik sovg'angizni oling!</div>
        </div>

        <div id="section-inventory" class="app-section">
            <h2 class="title">INVENTORY</h2>
        </div>

        <div id="section-profile" class="app-section">
            <h2 class="title">PROFILE</h2>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item" onclick="showSection('bonus', this)">
                <img src="img/nav_bonus.png" alt="Bonus"><span>Bonus</span>
            </button>
            <button class="nav-item active" onclick="showSection('cases', this)">
                <img src="img/nav_cases.png" alt="Cases"><span>Cases</span>
            </button>
            <button class="nav-item" onclick="showSection('inventory', this)">
                <img src="img/nav_inv.png" alt="Inv"><span>Inventory</span>
            </button>
            <button class="nav-item" onclick="showSection('profile', this)">
                <img src="img/nav_profile.png" alt="Profile"><span>Profile</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
