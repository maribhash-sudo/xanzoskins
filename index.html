<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-shell">
        <main class="app-content">
            <section id="page-bonus" class="page active">
                <div class="hero-coin-container">
                    <img src="./img/nav_diamond.png" class="hero-coin">
                    <div class="balance-text" id="balance">10,000</div>
                </div>
                <h2 class="section-title">DOIMIY BONUSLAR</h2>
                <div class="bonus-card">
                    <div class="bonus-info">Kunlik mukofot</div>
                    <button class="btn-neon">OLISH</button>
                </div>
            </section>

            <section id="page-cases" class="page">
                <h2 class="section-title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </section>

            <section id="page-inventory" class="page">
                <h2 class="section-title">INVENTAR</h2>
                <div id="inventory-grid" class="grid"></div>
            </section>

            <section id="page-profile" class="page">
                <div class="profile-avatar"></div>
                <div class="menu-list">
                    <div class="menu-item-card"><span class="menu-icon">👤</span><span class="menu-text">Mening profilim</span></div>
                    <div class="menu-item-card"><span class="menu-icon">💎</span><span class="menu-text">Up-grade</span></div>
                    <div class="menu-item-card"><span class="menu-icon">🔗</span><span class="menu-text">Trade Link</span></div>
                    <div class="menu-item-card"><span class="menu-icon">👥</span><span class="menu-text">Hamjamiyat</span></div>
                    <div class="menu-item-card"><span class="menu-icon">⚙️</span><span class="menu-text">Sozlamalar</span></div>
                </div>
            </section>
        </main>

        <div class="nav-container">
            <nav class="app-nav">
                <button class="nav-btn active" onclick="showPage('bonus', this)"><img src="./img/nav_diamond.png"></button>
                <button class="nav-btn" onclick="showPage('cases', this)"><img src="./img/nav_case.png"></button>
                <button class="nav-btn" onclick="showPage('inventory', this)"><img src="./img/nav_inventory.png"></button>
                <button class="nav-btn" onclick="showPage('profile', this)"><img src="./img/profile.png"></button>
            </nav>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
