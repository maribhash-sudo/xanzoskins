<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup">To'ldirish</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title">CASES</h2>
                <div id="cases-grid" class="grid">
                    <div class="case-card">
                        <img src="img/Awp.jpg" alt="AWP">
                        <p>AWP Case</p>
                    </div>
                </div>
            </div>

            <div id="page-bonus" class="page">
                <h2 class="section-title">BONUS</h2>
                <div class="card">Kundalik bonusni qabul qiling!</div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title">INVENTORY</h2>
                <div class="inventory-grid">
                    </div>
            </div>

            <div id="page-profile" class="page">
                <h2 class="section-title">PROFILE</h2>
                <div class="user-card">
                    <div class="avatar"></div>
                    <h3>Dag1sss23</h3>
                </div>

                <div id="profile-settings-section" class="sf-settings-container">
                    <div class="sf-menu-item" onclick="toggleLanguage()">
                        <div class="sf-item-left">🌐 <span data-key="change_lang">Change Language</span></div>
                        <span id="current-lang-display" class="sf-lang-status">EN</span>
                    </div>
                    <div class="sf-menu-item" onclick="handleTradeLink()">
                        <div class="sf-item-left">🔗 <span data-key="trade_link">Trade Link</span></div>
                        <span class="sf-arrow">❯</span>
                    </div>
                    <div class="sf-menu-item" onclick="window.open('https://t.me/community', '_blank')">
                        <div class="sf-item-left">👥 <span data-key="community">Community</span></div>
                        <span class="sf-arrow">❯</span>
                    </div>
                </div>
            </div>
        </main>

        <nav class="navbar">
            <button class="nav-btn" onclick="showPage('cases')">Cases</button>
            <button class="nav-btn" onclick="showPage('bonus')">Bonus</button>
            <button class="nav-btn" onclick="showPage('inventory')">Inv</button>
            <button class="nav-btn" onclick="showPage('profile')">Profile</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
