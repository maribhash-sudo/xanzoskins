<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="balance-box">
                <img src="img/nav_diamond.png">
                <span id="balance">10,000</span>
            </div>
        </header>

        <main class="app-content">
            <section id="page-bonus" class="page">
                <div class="bonus-hero">
                    <img src="img/nav_diamond.png" class="big-coin">
                    <h2 style="color:var(--tiffany); margin-top:20px;">DAILY BONUS</h2>
                </div>
                </section>

            <section id="page-cases" class="page">
                <div id="cases-grid" class="grid"></div>
            </section>

            <section id="page-inventory" class="page">
                <h2 style="text-align:center; color:var(--tiffany);">INVENTORY</h2>
                <div id="inventory-grid" class="grid"></div>
            </section>

            <section id="page-profile" class="page">
                <h2 style="text-align:center; color:var(--tiffany);">SETTINGS</h2>
                </section>
        </main>

        <nav class="app-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)"><img src="img/nav_diamond.png"></button>
            <button class="nav-btn" onclick="showPage('cases', this)"><img src="img/nav_case.png"></button>
            <button class="nav-btn" onclick="showPage('inventory', this)"><img src="img/nav_inventory.png"></button>
            <button class="nav-btn" onclick="showPage('profile', this)"><img src="img/profile.png"></button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
