<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="roulette.css"> <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header" id="main-header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup" data-lang="topup">TO'LDIRISH</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title" data-lang="cases_title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <div id="page-bonus" class="page">
                <h2 class="section-title" data-lang="bonus_title">ACTIVE TASKS</h2>
                <div id="active-tasks-list" class="task-container"></div>
                <h2 class="section-title" style="margin-top:30px;" data-lang="completed">COMPLETED</h2>
                <div id="done-tasks-list" class="task-container"></div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title" data-lang="inv_title">INVENTORY</h2>
            </div>

            <div id="page-profile" class="page">
                <div class="profile-header">
                    <div class="avatar-circle" id="user-avatar">?</div>
                    <h3 id="user-name">User</h3>
                </div>
                <div class="card">
                    <p style="margin-bottom:10px;" data-lang="select_lang">Tilni tanlang:</p>
                    <button id="lang-toggle-btn" class="lang-btn" onclick="toggleLanguage(); playSound('click')">
                        🇺🇿 O'zbekcha
                    </button>
                </div>
                <div class="card">
                    <p data-lang="trade_link">Steam Trade Link:</p>
                    <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/...">
                    <button onclick="saveSteamLink(); playSound('click')" data-lang="save_btn">SAQLASH</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this); playSound('click')"><img src="img/nav_diamond.png"><span data-lang="nav_bonus">Bonus</span></button>
            <button class="nav-btn active" onclick="showPage('cases', this); playSound('click')"><img src="img/nav_case.png"><span data-lang="nav_cases">Cases</span></button>
            <button class="nav-btn" onclick="showPage('inventory', this); playSound('click')"><img src="img/nav_inventory.png"><span data-lang="nav_inv">Inv</span></button>
            <button class="nav-btn" onclick="showPage('profile', this); playSound('click')"><img src="img/profile.png"><span data-lang="nav_profile">Profile</span></button>
        </nav>
    </div>

    <div id="roulette-modal" class="roulette-modal" style="display: none;">
        <div id="roulette-viewport" class="roulette-viewport">
            <div id="roulette-track" class="roulette-track"></div>
        </div>
        <div id="result-display" class="result-display" style="display: none;">
            <h3>YUTUQ!</h3>
            <img id="won-skin-img" src="" alt="Winner">
            <p id="won-skin-name"></p>
            <p id="won-skin-price"></p>
            <div class="modal-btns">
                <button onclick="withdrawWonSkin()">STEAMGA YUBORISH</button>
                <button onclick="sellWonSkin()" style="background:#444;">SOTISH</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="audio.js"></script>
    <script src="game.js"></script>
    <script src="roulette.js"></script>
</body>
</html>
