<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="roulette.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header" id="main-header">
            <div class="balance-box" style="display: flex; align-items: center;">
                <img src="img/nav_diamond.png" class="coin-glow" alt="coin" style="width:30px; margin-right:8px;">
                <span id="balance">10000</span>
            </div>
            <button class="btn-topup" data-lang="topup">TO'LDIRISH</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title" data-lang="cases_title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <div id="page-bonus" class="page">
                <div class="bonus-hero" style="text-align: center; padding: 20px 0;">
                    <img src="img/nav_diamond.png" class="coin-glow" alt="coin" style="width:80px; margin-bottom:10px;">
                    <h2 id="balance-large" style="font-size: 32px; margin: 0;">10000</h2>
                    <p style="color: #777; font-size: 14px; margin-top: 5px;" data-lang="balance_desc">Sizning balansingiz</p>
                </div>

                <h2 class="section-title" data-lang="bonus_title">DOIMIY BONUSLAR</h2>

                <div class="task-card-pro">
                    <div class="task-info-main">
                        <div class="task-icon-circle">🎁</div>
                        <div class="task-text-content">
                            <h4 data-lang="daily_reward">Kunlik mukofot</h4>
                            <p data-lang="daily_desc">+50 dan 5000 COINgacha</p>
                        </div>
                    </div>
                    <button id="bonus-btn" onclick="claimDailyBonus()" class="btn-action-pro" data-lang="claim_btn">OLISH</button>
                </div>
                <p id="bonus-message" style="text-align:center; font-size: 12px; margin-top: -5px; margin-bottom: 15px;"></p>

                <div class="task-card-pro">
                    <div class="task-info-main">
                        <div class="task-icon-circle">👥</div>
                        <div class="task-text-content">
                            <h4 data-lang="referral_title">Do'stlarni taklif qilish</h4>
                            <p data-lang="referral_desc">Har bir do'st uchun +500 COIN</p>
                        </div>
                    </div>
                    <button onclick="copyRefLink()" class="btn-action-pro" data-lang="link_btn">LINK</button>
                </div>
                <input type="text" id="ref-link" readonly style="display:none;">

                <div class="task-card-pro">
                    <div class="task-info-main">
                        <div class="task-icon-circle">🏷️</div>
                        <div class="task-text-content">
                            <h4 data-lang="nick_title">Nikga bot nomini qo'shish</h4>
                            <p data-lang="nick_desc">Har 24 soatda +50 COIN</p>
                        </div>
                    </div>
                    <button onclick="checkNickName()" class="btn-action-pro" data-lang="check_btn">TEKSHIRISH</button>
                </div>

                <h2 class="section-title" data-lang="active_tasks">ACTIVE TASKS</h2>
                <div id="active-tasks-list" class="task-container"></div>
                
                <h2 class="section-title" style="margin-top:30px;" data-lang="completed">COMPLETED</h2>
                <div id="done-tasks-list" class="task-container"></div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title" data-lang="inventory_title">INVENTORY</h2>
                <button onclick="sellAllInventory()" style="margin: 10px; padding: 10px; background: #e74c3c; color: white; border: none; width: 90%; border-radius: 5px; font-weight: bold;">BARCHASINI SOTISH</button>
                <div id="inventory-list" class="grid"></div>
            </div>

            <div id="page-profile" class="page">
                <div class="card">
                    <p data-lang="select_lang">Tilni tanlang:</p>
                    <div class="grid-buttons">
                        <button class="lang-btn" onclick="setLanguage('uz')">🇺🇿 UZ</button>
                        <button class="lang-btn" onclick="setLanguage('ru')">🇷🇺 RU</button>
                        <button class="lang-btn" onclick="setLanguage('en')">🇺🇸 EN</button>
                    </div>
                </div>
                <div class="card">
                    <p data-lang="trade_link">Steam Trade Link:</p>
                    <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/...">
                    <button onclick="saveSteamLink()" data-lang="save_btn" class="btn-action-pro" style="width: 100%; margin-top: 10px;">SAQLASH</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)"><img src="img/nav_diamond.png"><span data-lang="nav_bonus">Bonus</span></button>
            <button class="nav-btn active" onclick="showPage('cases', this)"><img src="img/nav_case.png"><span data-lang="nav_cases">Cases</span></button>
            <button class="nav-btn" onclick="showPage('inventory', this)"><img src="img/nav_inventory.png"><span data-lang="nav_inv">Inv</span></button>
            <button class="nav-btn" onclick="showPage('profile', this)"><img src="img/profile.png"><span data-lang="nav_profile">Profile</span></button>
        </nav>
    </div>

    <div id="roulette-modal" class="roulette-modal" style="display: none;">
        <div id="roulette-viewport" class="roulette-viewport">
            <div id="roulette-track" class="roulette-track"></div>
        </div>
        <button class="skip-btn" onclick="skipRoulette()">Пропустить анимацию ⏭</button>
        
        <div id="result-display" class="result-display" style="display: none;">
            <img id="won-skin-img" src="" class="won-skin-img" alt="Winner">
            <h3 id="won-skin-name" class="won-skin-name"></h3>
            <p id="won-skin-quality" class="won-skin-quality"></p>
            
            <div class="modal-btns">
                <button class="btn-upgrade">Улучшить</button>
                <button class="btn-again" onclick="startBudgetRoulette()">Крутить ещё 💎 5000</button>
                <button id="sell-btn" class="sell-btn" onclick="sellWonSkin()">
                    Продать за 💎 <span id="won-skin-price-val">...</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="audio.js"></script>
    <script src="roulette.js"></script>
</body>
</html>
