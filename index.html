<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <main id="content">
            <section id="page-bonus" class="view active">
                <div class="bonus-header">
                    <h1 id="user-balance">10000</h1>
                    <p>Sizning balansingiz</p>
                </div>
                <div class="cards-wrapper" id="bonus-list"></div>
            </section>
            
            <section id="page-cases" class="view">
                <div class="grid-container" id="cases-grid"></div>
            </section>
        </main>

        <nav class="bottom-menu">
            <button onclick="App.view('bonus', this)" class="nav-btn active">BONUS</button>
            <button onclick="App.view('cases', this)" class="nav-btn">CASES</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
