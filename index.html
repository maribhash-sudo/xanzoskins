<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="balance-box">
                <img src="img/nav_diamond.png">
                <span id="balance">10,000</span>
            </div>
        </header>

        <main class="app-content">
            <section id="page-cases" class="page active">
                <div id="cases-grid" class="grid"></div>
            </section>

            <section id="page-bonus" class="page">
                <div class="hero-coin-container">
                    <img src="img/nav_diamond.png" class="hero-coin">
                    <div class="balance-text" id="balance-large">10,000</div>
                </div>
                <h2 style="color:var(--tiffany); text-align:center;">DOIMIY BONUSLAR</h2>
                <div class="bonus-card" style="background:#111; padding:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; margin:10px;">
                    <div class="bonus-info">Kunlik mukofot</div>
                    <button class="btn-neon" style="background:var(--tiffany); border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">OLISH</button>
                </div>
            </section>

            <section id="page-inventory" class="page">
                <h2 style="color:var(--tiffany); text-align:center;">INVENTAR</h2>
                <div id="inventory-grid" class="grid"></div>
            </section>

            <section id="page-profile" class="page">
                <div class="profile-avatar"></div>
                <div class="menu-list">
                    <div class="menu-item"><img src="img/profile.png"> <span>Mening profilim</span></div>
                    <div class="menu-item"><img src="img/nav_diamond.png"> <span>Up-grade</span></div>
                    <div class="menu-item"><img src="img/nav_case.png"> <span>Trade Link</span></div>
                    <div class="menu-item"><img src="img/nav_inventory.png"> <span>Hamjamiyat</span></div>
                    <div class="menu-item"><img src="img/profile.png"> <span>Sozlamalar</span></div>
                </div>
            </section>
        </main>

        <nav class="app-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)"><img src="img/nav_diamond.png"></button>
            <button class="nav-btn active" onclick="showPage('cases', this)"><img src="img/nav_case.png"></button>
            <button class="nav-btn" onclick="showPage('inventory', this)"><img src="img/nav_inventory.png"></button>
            <button class="nav-btn" onclick="showPage('profile', this)"><img src="img/profile.png"></button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
