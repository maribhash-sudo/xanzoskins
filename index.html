<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup">To'ldirish</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <div id="page-bonus" class="page">
                <h2 class="section-title">BONUS</h2>
                <div class="card">Kundalik bonusni qabul qiling!</div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title">INVENTORY</h2>
            </div>

            <div id="page-profile" class="page">
    <div class="profile-header">
        <div class="avatar-circle" id="user-avatar">?</div>
        <h3 id="user-name">User</h3>
    </div>

    <div class="profile-list">
        <div class="list-item" onclick="changeLang()">
            <span>Change Language</span>
            <span id="lang-val">RU</span>
        </div>
        <div class="list-item">
            <span>Enable Sounds</span>
            <label class="switch">
                <input type="checkbox" id="sound-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="list-item" onclick="promptTrade()">
            <span>Trade Link</span>
        </div>
        <div class="list-item" onclick="window.open('https://t.me/community', '_blank')">
            <span>Community</span>
        </div>
        <div class="list-item" onclick="window.open('https://t.me/chat', '_blank')">
            <span>Chat Community</span>
        </div>
        <div class="list-item" onclick="window.open('https://t.me/admin', '_blank')">
            <span>Support</span>
        </div>
    </div>
</div>
