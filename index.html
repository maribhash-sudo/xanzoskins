<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="roulette.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box"><img src="img/nav_diamond.png"> <span id="balance">10000</span></div>
            <button onclick="topUpBalance()">+</button>
        </header>

        <main id="content">
            <div id="page-cases" class="view active">
                <div id="cases-grid" class="grid"></div>
            </div>
            </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus')"><img src="img/nav_diamond.png"><span>Bonus</span></button>
            <button class="nav-btn active" onclick="showPage('cases')"><img src="img/nav_case.png"><span>Cases</span></button>
            <button class="nav-btn" onclick="showPage('inventory')"><img src="img/nav_inventory.png"><span>Inv</span></button>
            <button class="nav-btn" onclick="showPage('profile')"><img src="img/profile.png"><span>Profile</span></button>
        </nav>
    </div>
    <div id="roulette-modal"></div>
    <script src="script.js"></script>
    <script src="roulette.js"></script>
</body>
</html>
