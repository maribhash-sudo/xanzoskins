<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup" data-lang="topup">To'ldirish</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title" data-lang="cases_title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <div id="page-bonus" class="page">
                <h2 class="section-title" data-lang="bonus_title">BONUS</h2>
                <div class="card" data-lang="bonus_desc">Kunlik bonusni qabul qiling!</div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title" data-lang="inv_title">INVENTORY</h2>
            </div>

            <div id="page-profile" class="page">
                <div class="profile-header">
                    <div class="avatar-circle" id="user-avatar">?</div>
                    <h3 id="user-name">User</h3>
                </div>
                <div class="profile-list">
                    <div class="card">
                        <p data-lang="lang_select" style="margin-bottom: 10px; font-weight: 600;">Tilni tanlang:</p>
                        <div class="grid-buttons">
                            <button class="lang-btn" onclick="setLanguage('uz')">🇺🇿 UZ</button>
                            <button class="lang-btn" onclick="setLanguage('ru')">🇷🇺 RU</button>
                            <button class="lang-btn" onclick="setLanguage('en')">🇺🇸 EN</button>
                        </div>
                    </div>
                    <div class="card">
                        <p data-lang="trade_link">Steam Trade Link:</p>
                        <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/...">
                        <button onclick="saveTradeLink()" data-lang="save_btn">Saqlash</button>
                    </div>
                </div>
            </div>
        </main>

        <div id="case-modal" class="modal">
            <div class="roulette-container">
                <div class="selector"></div>
                <div class="roulette-track" id="roulette-track"></div>
            </div>
            <div id="win-display" class="win-display"></div>
            <button id="close-modal-btn" onclick="closeModal()" style="display:none; width: 80%; margin-top: 20px;">Yopish</button>
        </div>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)">
                <img src="img/nav_diamond.png"><span data-lang="nav_bonus">Bonus</span>
            </button>
            <button class="nav-btn active" onclick="showPage('cases', this)">
                <img src="img/nav_case.png"><span data-lang="nav_cases">Cases</span>
            </button>
            <button class="nav-btn" onclick="showPage('inventory', this)">
                <img src="img/nav_inventory.png"><span data-lang="nav_inv">Inv</span>
            </button>
            <button class="nav-btn" onclick="showPage('profile', this)">
                <img src="img/profile.png"><span data-lang="nav_profile">Profile</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
