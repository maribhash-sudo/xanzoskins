<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup">To'ldirish</button>
        </header>

        <main>
    <div id="page-cases" class="page active">
        <h2 class="section-title">CASES</h2>
        <div id="cases-grid" class="grid">
            </div>
    </div>

    <div id="page-bonus" class="page">
        <h2 class="section-title">BONUS</h2>
        <div class="card">Kundalik bonusni qabul qiling!</div>
    </div>

    <div id="page-inventory" class="page">
        <h2 class="section-title">INVENTORY</h2>
        </div>

    <div id="page-profile" class="page">
        <h2 class="section-title">PROFILE</h2>
        
        <div class="user-info-card">
            <h3>Dag1sss23</h3>
        </div>

        <div id="profile-settings-section" class="sf-settings-container">
            <div class="sf-menu-item" onclick="toggleLanguage()">
                <div class="sf-item-left"><span>🌐</span> <span data-key="change_lang">Change Language</span></div>
                <span id="current-lang-display">EN</span>
            </div>
            <div class="sf-menu-item" onclick="handleTradeLink()">
                <div class="sf-item-left"><span>🔗</span> <span data-key="trade_link">Trade Link</span></div>
            </div>
            <div class="sf-menu-item">
                <div class="sf-item-left"><span>👥</span> <span data-key="community">Community</span></div>
            </div>
            <div class="sf-menu-item">
                <div class="sf-item-left"><span>🎧</span> <span data-key="support">Contact Support</span></div>
            </div>
        </div>
    </div>
</main>
