<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinOz Market</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="stats-bar">
            <div class="balance">
                <img src="img/coin.png" alt="Coin" class="coin-icon">
                <span id="balance">10000</span>
            </div>
            <button class="top-up">To'ldirish</button>
        </div>

        <div id="cases-grid" class="cases-grid"></div>

        <nav class="bottom-nav">
    <button class="nav-item active" onclick="showSection('bonus', this)">
        <img src="img/nav_diamond.png" alt="Bonus">
        <span>Bonus</span>
    </button>
    <button class="nav-item" onclick="showSection('cases', this)">
        <img src="img/nav_case.png" alt="Cases">
        <span>Cases</span>
    </button>
    <button class="nav-item" onclick="showSection('inventory', this)">
        <img src="img/nav_inventory.png" alt="Inv">
        <span>Inv</span>
    </button>
    <button class="nav-item" onclick="showSection('profile', this)">
        <img src="img/nav_profile.png" alt="Profile">
        <span>Profile</span>
    </button>
</nav>
