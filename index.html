<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="roulette.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header" id="main-header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup" data-lang="topup">TO'LDIRISH</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title" data-lang="cases_title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <div id="page-bonus" class="page">
                <h2 class="section-title">DAILY BONUS</h2>
                <div class="card" style="text-align: center;">
                    <button id="bonus-btn" onclick="claimDailyBonus()" style="padding:15px; width:100%; background: #FFD700; border:none; border-radius:5px; font-weight:bold;">KUNLIK BONUSNI OLISH</button>
                    <p id="bonus-message" style="margin-top:10px;"></p>
                </div>

                <h2 class="section-title">REFERRAL</h2>
                <div class="card">
                    <p>Do'stlarni taklif qiling:</p>
                    <input type="text" id="ref-link" readonly style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:white; border:none;">
                    <button onclick="copyRefLink()" style="width:100%;">HAVOLANI NUSXALASH</button>
                </div>

                <h2 class="section-title">NICKNAME BONUS</h2>
                <div class="card">
                    <p>Ismingizga @xanzoskins_bot qo'shing (+50 COIN):</p>
                    <button onclick="checkNickName()" style="width:100%; padding:10px; background:#2ecc71; border:none; border-radius:5px; font-weight:bold; color:white;">TEKSHIRISH</button>
                </div>

                <h2 class="section-title" data-lang="active_tasks">ACTIVE TASKS</h2>
                <div id="active-tasks-list" class="task-container"></div>
                <h2 class="section-title" style="margin-top:30px;" data-lang="completed">COMPLETED</h2>
                <div id="done-tasks-list" class="task-container"></div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title" data-lang="inventory_title">INVENTORY</h2>
                <button onclick="sellAllInventory()" style="margin: 10px; padding: 10px; background: #e74c3c; color: white; border: none; width: 90%; border-radius: 5px;">BARCHASINI SOTISH</button>
                <div id="inventory-grid" class="grid"></div>
            </div>

            <div id="page-profile" class="page">
                <div class="card">
                    <p data-lang="select_lang">Tilni tanlang:</p>
                    <div class="grid-buttons">
                        <button class="lang-btn" onclick="setLanguage('uz')">🇺🇿 UZ</button>
                        <button class="lang-btn" onclick="setLanguage('ru')">🇷🇺 RU</button>
                        <button class="lang-btn" onclick="setLanguage('en')">🇺🇸 EN</button>
                    </div>
                </div>
                <div class="card">
                    <p data-lang="trade_link">Steam Trade Link:</p>
                    <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/...">
                    <button onclick="saveSteamLink()" data-lang="save_btn">SAQLASH</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)"><img src="img/nav_diamond.png"><span data-lang="nav_bonus">Bonus</span></button>
            <button class="nav-btn active" onclick="showPage('cases', this)"><img src="img/nav_case.png"><span data-lang="nav_cases">Cases</span></button>
            <button class="nav-btn" onclick="showPage('inventory', this)"><img src="img/nav_inventory.png"><span data-lang="nav_inv">Inv</span></button>
            <button class="nav-btn" onclick="showPage('profile', this)"><img src="img/profile.png"><span data-lang="nav_profile">Profile</span></button>
        </nav>
    </div>

    <div id="roulette-modal" class="roulette-modal" style="display: none;">
        <div id="roulette-viewport" class="roulette-viewport">
            <div id="roulette-track" class="roulette-track"></div>
        </div>
        <div id="result-display" class="result-display" style="display: none;">
            <h3>YUTUQ!</h3>
            <img id="won-skin-img" src="" alt="Winner">
            <p id="won-skin-name"></p>
            <p id="won-skin-price"></p>
            <div class="modal-btns">
                <button onclick="withdrawWonSkin()">STEAMGA YUBORISH</button>
                <button onclick="sellWonSkin()" style="background:#444;">SOTISH</button>
                <button onclick="startBudgetRoulette()" style="background:green;">YANA AYLANTIRISH</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="audio.js"></script>
    <script src="roulette.js"></script>
</body>
</html>
