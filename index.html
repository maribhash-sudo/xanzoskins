<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup">To'ldirish</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <div id="page-bonus" class="page">
                <h2 class="section-title">TASKS</h2>
                <div class="task-list">
                    <div class="task-card"><span>Kundalik bonus</span><button class="btn-task">+100</button></div>
                    <div class="task-card"><span>Telegramga obuna</span><button class="btn-task">+250</button></div>
                    <div class="task-card done"><span>Birinchi depozit</span><span class="status">Bajarildi</span></div>
                </div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title">INVENTORY</h2>
            </div>

            <div id="page-profile" class="page">
                <h2 class="section-title">PROFILE</h2>
                <div class="profile-list">
                    <div class="list-item" onclick="changeLang()"><span>Tilni o'zgartirish</span> <span id="lang-val">RU</span></div>
                    <div class="list-item" onclick="promptTrade()"><span>Trade Link</span> <span>&gt;</span></div>
                    <div class="list-item" onclick="window.open('https://t.me/admin')"><span>Support</span> <span>&gt;</span></div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)"><img src="img/nav_diamond.png"><span>Bonus</span></button>
            <button class="nav-btn active" onclick="showPage('cases', this)"><img src="img/nav_case.png"><span>Cases</span></button>
            <button class="nav-btn" onclick="showPage('inventory', this)"><img src="img/nav_inventory.png"><span>Inv</span></button>
            <button class="nav-btn" onclick="showPage('profile', this)"><img src="img/profile.png"><span>Profile</span></button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
