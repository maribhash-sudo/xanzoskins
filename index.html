<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup">TO'LDIRISH</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <div id="page-bonus" class="page">
                <h2 class="section-title">ACTIVE TASKS</h2>
                <div id="active-tasks-list" class="task-container">
                    <div class="task-card" id="task-tg">
                        <div class="task-info">
                            <span>Telegram Obuna</span>
                            <small>+250 COIN</small>
                        </div>
                        <button class="btn-task" onclick="completeTask('tg', 250, 'https://t.me/community')">CLAIM</button>
                    </div>
                    <div class="task-card" id="task-insta">
                        <div class="task-info">
                            <span>Instagram Obuna</span>
                            <small>+250 COIN</small>
                        </div>
                        <button class="btn-task" onclick="completeTask('insta', 250, 'https://instagram.com/')">CLAIM</button>
                    </div>
                    <div class="task-card" id="task-steam">
                        <div class="task-info">
                            <span>Steam Link Ulash</span>
                            <small>+500 COIN</small>
                        </div>
                        <button class="btn-task" onclick="showPage('profile', document.querySelectorAll('.nav-btn')[3])">ULASH</button>
                    </div>
                </div>

                <h2 class="section-title" style="margin-top: 30px;">COMPLETED</h2>
                <div id="done-tasks-list" class="task-container">
                    </div>
            </div>

            <div id="page-inventory" class="page">
                <h2 class="section-title">INVENTORY</h2>
                <div id="inventory-list" class="grid"></div>
            </div>

            <div id="page-profile" class="page">
                <div class="profile-header">
                    <div class="avatar-circle" id="user-avatar">?</div>
                    <h3 id="user-name">User</h3>
                </div>
                <div class="card">
                    <p style="margin-bottom: 10px;">Steam Trade Link:</p>
                    <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/tradeoffer/new/...">
                    <button onclick="saveSteamLink()">SAQLASH VA BONUS OLISH</button>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)">
                <img src="img/nav_diamond.png"><span>Bonus</span>
            </button>
            <button class="nav-btn active" onclick="showPage('cases', this)">
                <img src="img/nav_case.png"><span>Cases</span>
            </button>
            <button class="nav-btn" onclick="showPage('inventory', this)">
                <img src="img/nav_inventory.png"><span>Inv</span>
            </button>
            <button class="nav-btn" onclick="showPage('profile', this)">
                <img src="img/profile.png"><span>Profile</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
