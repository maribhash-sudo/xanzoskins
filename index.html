<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xanzo Skins</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <span id="balance">10000</span> <small>COIN</small>
            </div>
            <button class="btn-topup" data-lang="topup">To'ldirish</button>
        </header>

        <main>
            <div id="page-cases" class="page active">
                <h2 class="section-title" data-lang="cases_title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </div>

            <section id="page-bonus" class="view active">
    <div class="bonus-header">
        <img src="img/nav_diamond.png" class="main-coin">
        <h1 id="display-balance">10000</h1>
        <p>Sizning balansingiz</p>
    </div>

    <div class="cards-wrapper">
        <h3 style="color:var(--accent)">DOIMIY BONUSLAR</h3>
        
        <div class="card-box">
            <div class="card-info">
                <span class="icon">🎁</span>
                <div>
                    <h4>Kunlik mukofot</h4>
                    <p>+50 dan 5000 COINgacha</p>
                </div>
            </div>
            <button onclick="app.claimDaily()" class="btn-glow">OLISH</button>
        </div>

        <div class="card-box">
            <div class="card-info">
                <span class="icon">✈️</span>
                <div>
                    <h4>Telegram Kanal</h4>
                    <p>+150 COIN</p>
                </div>
            </div>
            <button onclick="app.socialTask('tg')" class="btn-glow">OBUNA</button>
        </div>

        <div class="card-box">
            <div class="card-info">
                <span class="icon">📸</span>
                <div>
                    <h4>Instagram</h4>
                    <p>+150 COIN</p>
                </div>
            </div>
            <button onclick="app.socialTask('inst')" class="btn-glow">OBUNA</button>
        </div>
    </div>
</section>

    <div class="task-card-pro">
        <div class="task-info-main">
            <div class="task-icon-circle" style="color: #171a21;">🎮</div>
            <div class="task-text-content">
                <h4>Steam Guruh</h4>
                <p>+150 COIN</p>
            </div>
        </div>
        <button onclick="handleSocialTask('steam')" class="btn-action-pro">QO'SHILISH</button>
    </div>

    <h2 class="section-title">BOSHQA VAZIFALAR</h2>
    <div id="active-tasks-list" class="task-container"></div>
    
    <h2 class="section-title" style="margin-top:30px;">BAJARILGAN</h2>
    <div id="done-tasks-list" class="task-container"></div>
</div>

            <div id="page-inventory" class="page">
                <h2 class="section-title" data-lang="inventory_title">INVENTORY</h2>
            </div>

            <div id="page-profile" class="page">
                <div class="profile-header">
                    <div class="avatar-circle" id="user-avatar">?</div>
                    <h3 id="user-name">User</h3>
                </div>
                
                <div class="profile-list">
                    <div class="card lang-card">
                        <p data-lang="select_lang">Tilni tanlang:</p>
                        <div class="grid-buttons">
                            <button onclick="setLanguage('uz')">🇺🇿 UZ</button>
                            <button onclick="setLanguage('ru')">🇷🇺 RU</button>
                            <button onclick="setLanguage('en')">🇺🇸 EN</button>
                        </div>
                    </div>

                    <div class="card trade-card">
                        <p data-lang="trade_link_title">Steam Trade Link:</p>
                        <input type="text" id="tradeLinkInput" placeholder="https://steamcommunity.com/tradeoffer/new/...">
                        <button onclick="saveTradeLink()" data-lang="save_btn">Saqlash</button>
                    </div>

                    <div class="card links-card">
                        <button class="list-btn" onclick="window.open('https://t.me/community', '_blank')">👥 Community</button>
                        <button class="list-btn" onclick="window.open('https://t.me/admin', '_blank')">🎧 Support</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)">
                <img src="img/nav_diamond.png"><span data-lang="nav_bonus">Bonus</span>
            </button>
            <button class="nav-btn active" onclick="showPage('cases', this)">
                <img src="img/nav_case.png"><span data-lang="nav_cases">Cases</span>
            </button>
            <button class="nav-btn" onclick="showPage('inventory', this)">
                <img src="img/nav_inventory.png"><span data-lang="nav_inv">Inv</span>
            </button>
            <button class="nav-btn" onclick="showPage('profile', this)">
                <img src="img/profile.png"><span data-lang="nav_profile">Profile</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
