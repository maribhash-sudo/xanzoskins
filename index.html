<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xanzo Skins</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="balance-box">
                <img src="img/nav_diamond.png" alt="coin">
                <span id="balance">10000</span>
            </div>
        </header>

        <main id="content">
            <section id="page-cases" class="page active">
                <h2 class="title">CASES</h2>
                <div id="cases-grid" class="grid"></div>
            </section>

            <section id="page-bonus" class="page">
                <h2 class="title">BONUS</h2>
                <div class="bonus-list" id="bonus-list"></div>
            </section>

            <section id="page-inventory" class="page">
                <h2 class="title">INVENTORY</h2>
                <div id="inv-grid" class="grid"></div>
            </section>

            <section id="page-profile" class="page">
                <h2 class="title">PROFILE</h2>
                <div class="profile-card">
                    <input type="text" id="tradeLink" placeholder="Steam Trade Link...">
                    <button onclick="saveTradeLink()">SAQLASH</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="showPage('bonus', this)">Bonus</button>
            <button class="nav-btn active" onclick="showPage('cases', this)">Cases</button>
            <button class="nav-btn" onclick="showPage('inventory', this)">Inv</button>
            <button class="nav-btn" onclick="showPage('profile', this)">Profile</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
